name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: get-tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.get-tag.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build
        run: npm ci && npm run release

      - name: Get system ID
        id: sys
        run: echo "id=$(jq -r .id system.json)" >> "$GITHUB_OUTPUT"

      - name: Create ZIP
        run: cd build && zip -r ../${{ steps.sys.outputs.id }}.zip *

      - name: Patch system.json URLs
        run: |
          TAG="${{ steps.get-tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          jq --arg dl "https://github.com/${REPO}/releases/download/${TAG}/${{ steps.sys.outputs.id }}.zip" \
             --arg mf "https://github.com/${REPO}/releases/latest/download/system.json" \
             '.download = $dl | .manifest = $mf' system.json > system_patched.json
          mv system_patched.json system.json

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.get-tag.outputs.tag }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            "./${{ steps.sys.outputs.id }}.zip" \
            ./system.json \
            --title "$TAG" \
            --generate-notes
