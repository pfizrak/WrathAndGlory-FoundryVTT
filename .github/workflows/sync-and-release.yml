name: Sync upstream and release

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: sync-and-release
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream for new release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          UPSTREAM="moo-man/WrathAndGlory-FoundryVTT"
          UPSTREAM_TAG=$(gh release view --repo "$UPSTREAM" --json tagName -q .tagName)
          echo "upstream_tag=$UPSTREAM_TAG" >> "$GITHUB_OUTPUT"

          FORK_TAG=$(gh release view --repo "${{ github.repository }}" --json tagName -q .tagName 2>/dev/null || echo "")
          echo "fork_tag=$FORK_TAG" >> "$GITHUB_OUTPUT"

          if [ "$UPSTREAM_TAG" = "$FORK_TAG" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already up to date ($FORK_TAG)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New upstream release: $UPSTREAM_TAG (fork: $FORK_TAG)"
          fi

      - name: Checkout fork
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Reset to upstream tag
        if: steps.check.outputs.skip == 'false'
        run: |
          TAG="${{ steps.check.outputs.upstream_tag }}"
          git remote add upstream https://github.com/moo-man/WrathAndGlory-FoundryVTT.git || true
          git fetch upstream --tags --force
          git checkout --detach "refs/tags/$TAG"

      - name: Apply patches
        if: steps.check.outputs.skip == 'false'
        run: |
          # Rename premiumModules -> moduleRegistry
          sed -i 's/\bpremiumModules\b/moduleRegistry/g' scripts/common/config.js
          grep -q 'moduleRegistry' scripts/common/config.js || { echo "Patch failed"; exit 1; }

          # Rewrite system.json URLs to pfizrak fork
          REPO="${{ github.repository }}"

          sed -i "s|moo-man/WrathAndGlory-FoundryVTT|${REPO}|g" system.json
          sed -i "s|moo-man/WarhammerLibrary-FVTT|pfizrak/WarhammerLibrary-FVTT|g" system.json

          # Fix warhammer-lib manifest to use releases/latest/download
          sed -i 's|raw.githubusercontent.com/pfizrak/WarhammerLibrary-FVTT/[^/"]*/module.json|github.com/pfizrak/WarhammerLibrary-FVTT/releases/latest/download/module.json|g' system.json

          echo "=== Patched system.json ==="
          cat system.json

      - name: Commit and push tag
        if: steps.check.outputs.skip == 'false'
        run: |
          TAG="${{ steps.check.outputs.upstream_tag }}"
          git config user.name "pfizrak"
          git config user.email "209234886+pfizrak@users.noreply.github.com"
          git add -A
          git commit -m "Sync upstream ${TAG} with fork patches"
          git tag -f "$TAG"
          git push origin "refs/tags/$TAG" --force

      - name: Trigger release and copy notes
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.check.outputs.upstream_tag }}"
          REPO="${{ github.repository }}"

          # Trigger release workflow via dispatch (tag push may also trigger it)
          gh workflow run release.yml -f tag="$TAG" --repo "$REPO" || true

          # Wait for the release to be created
          echo "Waiting for release workflow..."
          for i in $(seq 1 60); do
            if gh release view "$TAG" --repo "$REPO" &>/dev/null; then
              echo "Release found after ${i}0s"
              break
            fi
            sleep 10
          done

          # Copy release notes from upstream
          UPSTREAM_NOTES=$(gh release view "$TAG" --repo "moo-man/WrathAndGlory-FoundryVTT" --json body -q .body 2>/dev/null || echo "")
          if [ -n "$UPSTREAM_NOTES" ]; then
            gh release edit "$TAG" --repo "$REPO" --notes "$UPSTREAM_NOTES"
          fi
